<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Final Year Student - Mock Interview Portal</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 300px; }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #28a745; border: none; color: white; font-size: 16px; border-radius: 4px; cursor: pointer; }
        button:hover { background: #218838; }
        #message { text-align: center; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Student Mock Login</h2>
    <input type="text" id="username" placeholder="Enter Username (use: student)">
    <input type="password" id="password" placeholder="Enter Password (use: mock2026)">
    <button onclick="handleLogin()">Login to Dashboard</button>
    <p id="message"></p>
</div>

<script src="auth.js"></script>
</body>
</html>
