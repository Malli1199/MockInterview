<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Enterprise Mock Portal</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #eef2f3; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); width: 340px; }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 24px; font-weight: 600; }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #dcdde1; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 14px; background: #2ecc71; border: none; color: white; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 15px; }
        button:hover { background: #27ae60; }
        #displayStatus { text-align: center; margin-top: 18px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>
<div class="login-card">
    <h2>Student Login Gating</h2>
    <input type="text" id="username" placeholder="Enter Registration ID">
    <input type="password" id="password" placeholder="Enter Access Password">
    <button id="submitBtn" onclick="executeAuth()">Verify Credentials</button>
    <p id="displayStatus"></p>
</div>
<script src="auth.js"></script>
</body>
</html>
